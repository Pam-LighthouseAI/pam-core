  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Civic Voice Canada</title>
  <meta name="description" content="Find the right level of government and your actual representatives for any civic issue across Canada. Draft letters and connect with your elected officials.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --civic-red: #C8102E;
      --civic-red-dark: #8B0000;
      --civic-accent: #E53935;
      --civic-gray: #F4F6F8;
      --charcoal: #2E2E2E;
      --white: #FFFFFF;
      --shadow: 0px 8px 20px rgba(0,0,0,0.08);
      --shadow-hover: 0px 12px 28px rgba(0,0,0,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: var(--civic-gray);
      color: var(--charcoal);
      line-height: 1.6;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Poppins', system-ui, sans-serif;
      color: var(--civic-red);
      line-height: 1.25;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }

    /* NAVIGATION */
    .site-nav {
      position: sticky; top: 0; z-index: 50;
      background: var(--white);
      height: 80px;
      display: flex; align-items: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .nav-inner {
      max-width: 1200px; width: 100%; margin: 0 auto;
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 20px;
      color: var(--charcoal); text-decoration: none; letter-spacing: -0.02em;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-logo svg { width: 30px; height: 30px; }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .nav-link {
      color: var(--charcoal); text-decoration: none;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      padding: 8px 14px; border-radius: 8px; transition: all 0.15s;
      background: none; border: none; cursor: pointer;
    }
    .nav-link:hover { color: var(--civic-red); background: rgba(200,16,46,0.08); text-decoration: none; }
    .nav-cta {
      background: var(--civic-red); color: #fff; border: none;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      padding: 10px 22px; border-radius: 8px; cursor: pointer;
      transition: all 0.2s; text-decoration: none;
    }
    .nav-cta:hover { background: var(--civic-red-dark); transform: translateY(-1px); text-decoration: none; }
    
    /* HAMBURGER MENU */
    .hamburger {
      display: none; flex-direction: column; justify-content: space-around;
      width: 28px; height: 24px; background: none; border: none; cursor: pointer;
      padding: 0; z-index: 100;
    }
    .hamburger span {
      display: block; width: 100%; height: 3px; background: var(--charcoal);
      border-radius: 2px; transition: all 0.3s;
    }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    
    .mobile-menu {
      display: none; position: fixed; top: 80px; left: 0; right: 0; bottom: 0;
      background: var(--white); z-index: 90; padding: 24px;
      flex-direction: column; gap: 8px; overflow-y: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu .nav-link {
      display: block; width: 100%; text-align: left; padding: 16px;
      font-size: 16px; border-radius: 12px;
    }
    .mobile-menu .nav-cta {
      display: block; width: 100%; text-align: center; padding: 16px;
      margin-top: 8px;
    }
    .mobile-menu .language-toggle {
      align-self: flex-start; margin-top: 8px;
    }

    /* HERO */
    .hero-section {
      background: var(--white);
      padding: 32px 24px 80px;
    }
    .hero-inner {
      max-width: 800px; margin: 0 auto;
      text-align: center;
    }
    .hero-headline {
      font-size: 48px; font-weight: 800; color: var(--civic-red);
      letter-spacing: -0.03em; margin-bottom: 20px;
    }
    .hero-sub {
      font-size: 18px; color: #555; line-height: 1.7; margin-bottom: 32px;
    }
    .hero-buttons { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }

    /* FLOATING HEADER */
    .site-nav.scrolled {
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    /* SECTIONS */
    .section { padding: 80px 24px; }
    .section-inner { max-width: 1200px; margin: 0 auto; }
    .section-gray { background: var(--civic-gray); }
    .section-white { background: var(--white); }
    .section-dark { background: var(--civic-red); color: #fff; }
    .section-dark h2, .section-dark h3 { color: #fff; }
    .section-heading {
      font-size: 32px; font-weight: 700; text-align: center;
      margin-bottom: 16px; letter-spacing: -0.02em;
    }
    .section-subheading {
      font-size: 18px; color: #666; text-align: center;
      max-width: 700px; margin: 0 auto 48px; line-height: 1.7;
    }

    /* CARDS */
    .how-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
    .how-card {
      background: var(--white); border-radius: 12px; padding: 32px;
      box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s;
      text-align: center;
    }
    .how-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
    .how-card-icon {
      width: 64px; height: 64px; border-radius: 16px; margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center; font-size: 28px;
      background: linear-gradient(135deg, rgba(47,164,169,0.12), rgba(47,164,169,0.05));
    }
    .how-card h3 { font-size: 22px; margin-bottom: 12px; }
    .how-card p { font-size: 15px; color: #666; line-height: 1.7; }

    /* WHY IT MATTERS */
    .why-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
    }
    .why-visual {
      width: 100%; aspect-ratio: 4/3; background: linear-gradient(135deg, rgba(47,164,169,0.06), rgba(31,58,95,0.04));
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    /* CTA */
    .cta-section { padding: 100px 24px; text-align: center; }
    .cta-inner { max-width: 1100px; margin: 0 auto; }
    .share-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
      max-width: 960px; margin: 40px auto 0;
    }
    .share-btn {
      background: var(--white); color: var(--civic-red);
      border: none; border-radius: 10px;
      padding: 18px 20px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0px 6px 16px rgba(0,0,0,0.12);
      text-decoration: none;
    }
    .share-btn:hover { background: #B91C1C; color: #fff; transform: translateY(-2px); text-decoration: none; }
    .share-btn svg { width: 20px; height: 20px; }

    /* FOOTER */
    .site-footer {
      background: var(--civic-red); color: rgba(255,255,255,0.75);
      padding: 60px 24px 32px;
    }
    .footer-inner {
      max-width: 1200px; margin: 0 auto;
      display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 40px;
    }
    .footer-col h4 { color: #fff; font-size: 16px; margin-bottom: 16px; }
    .footer-col p { font-size: 14px; line-height: 1.7; }
    .footer-link {
      display: block; color: rgba(255,255,255,0.7); text-decoration: none;
      font-size: 14px; margin-bottom: 10px; transition: color 0.15s;
    }
    .footer-link:hover { color: #fff; text-decoration: none; }
    .footer-bottom {
      max-width: 1200px; margin: 40px auto 0; padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.12);
      text-align: center; font-size: 13px; color: rgba(255,255,255,0.5);
    }

    /* TOOL SECTION */
    .tool-section {
      padding: 80px 24px;
      background: var(--civic-gray);
    }
    .tool-inner {
      max-width: 880px; margin: 0 auto;
    }

    /* BUTTONS */
    .btn-primary {
      background: var(--civic-accent); color: #fff; border: none;
      border-radius: 10px; padding: 16px 36px; font-size: 16px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 16px rgba(47,164,169,0.3); transition: all 0.2s; cursor: pointer;
    }
    .btn-primary:hover { background: #B91C1C; box-shadow: 0 6px 20px rgba(242,140,56,0.35); transform: translateY(-2px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: rgba(31,58,95,0.06); border: 1px solid rgba(31,58,95,0.15);
      border-radius: 10px; padding: 12px 22px; color: var(--civic-red);
      font-weight: 600; font-size: 14px; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { background: rgba(31,58,95,0.12); border-color: rgba(31,58,95,0.25); }
    .btn-outline {
      background: transparent; color: var(--civic-accent);
      border: 2px solid var(--civic-accent); border-radius: 10px;
      padding: 14px 32px; font-size: 16px; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .btn-outline:hover { background: var(--civic-accent); color: #fff; }

    /* FORM ELEMENTS */
    a { color: var(--civic-accent); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    input, select, textarea {
      width: 100%; padding: 12px 16px; font-size: 15px;
      font-family: 'Inter', sans-serif;
      background: var(--white); border: 2px solid #E0E4E8;
      border-radius: 10px; color: var(--charcoal); outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--civic-accent); }
    select { appearance: auto; }
    select option { background: var(--white); color: var(--charcoal); }
    textarea { resize: vertical; min-height: 80px; }
    button { font-family: 'Inter', sans-serif; cursor: pointer; }

    /* TOOL CARDS */
    .card {
      background: var(--white); border: 1px solid #E8ECF0;
      border-radius: 16px; padding: 28px; box-shadow: var(--shadow);
    }
    .issue-btn {
      background: var(--white); border: 1px solid #E8ECF0;
      border-radius: 10px; padding: 14px 18px; text-align: left; color: var(--charcoal);
      display: flex; align-items: center; justify-content: space-between; width: 100%;
      transition: all 0.15s; cursor: pointer;
    }
    .issue-btn:hover { background: rgba(47,164,169,0.04); border-color: var(--civic-accent); }
    .cat-btn {
      background: var(--white); border: 1px solid #E8ECF0;
      border-radius: 14px; padding: 18px 16px; text-align: left; color: var(--charcoal);
      transition: all 0.15s; cursor: pointer;
    }
    .cat-btn:hover { background: rgba(47,164,169,0.04); border-color: var(--civic-accent); transform: translateY(-2px); box-shadow: var(--shadow); }
    .loc-btn {
      background: var(--white); border: 2px solid #E0E4E8;
      border-radius: 12px; padding: 13px 22px; color: #888; font-weight: 600; font-size: 15px;
      position: relative; transition: all 0.15s; cursor: pointer;
    }
    .loc-btn.active { background: rgba(47,164,169,0.08); border-color: var(--civic-accent); color: var(--civic-accent); }
    .rep-card {
      background: var(--white); border-radius: 12px; padding: 20px;
      border: 1px solid #E8ECF0; transition: all 0.15s; cursor: pointer;
    }
    .rep-card:hover { border-color: var(--civic-accent); box-shadow: var(--shadow); }
    .badge {
      font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px;
      display: inline-block; color: #fff;
    }
    .spinner {
      display: inline-block; width: 48px; height: 48px;
      border: 3px solid #E0E4E8; border-top-color: var(--civic-accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    /* LANGUAGE TOGGLE */
    .language-toggle {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 42px; height: 32px; padding: 0 12px;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: 0.5px; color: #fff;
      background: var(--civic-red);
      border: none; border-radius: 8px; cursor: pointer;
      transition: all 0.2s;
    }
    .language-toggle:hover { background: var(--civic-red-dark); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(31,58,95,0.6); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .modal {
      background: var(--white); border: 1px solid #E8ECF0; border-radius: 20px;
      max-width: 640px; width: 100%; max-height: 90vh; overflow: auto; padding: 32px 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.15);
    }
    .modal h2 { color: var(--civic-red); }
    .modal h3 { color: var(--civic-red); }

    /* FOOTER BUTTONS (in-tool) */
    .footer-btn {
      background: rgba(31,58,95,0.04); border: 1px solid rgba(31,58,95,0.1);
      border-radius: 8px; padding: 8px 16px; color: #888;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; margin: 0 4px;
    }
    .footer-btn:hover { background: rgba(31,58,95,0.08); color: var(--civic-red); }

    /* FAQ */
    .faq-item { border-bottom: 1px solid #E8ECF0; }
    .faq-question {
      width: 100%; background: none; border: none;
      padding: 16px 20px; text-align: left; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      color: var(--civic-red); font-size: 15px; font-weight: 600;
    }
    .faq-question:hover { background: rgba(47,164,169,0.04); }
    .faq-answer { padding: 0 20px 16px; color: #666; font-size: 14px; line-height: 1.7; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .hero-inner { max-width: 600px; }
      .hero-headline { font-size: 36px; }
      .how-cards { grid-template-columns: 1fr; max-width: 420px; margin: 0 auto; }
      .why-grid { grid-template-columns: 1fr; text-align: center; }
      .share-grid { grid-template-columns: 1fr 1fr; }
      .footer-inner { grid-template-columns: 1fr; }
      .nav-links { display: none; }
    }
    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr !important; }
      .flow-row { flex-direction: column !important; }
      .share-grid { grid-template-columns: 1fr; }
      .hero-headline { font-size: 30px; }
      .section-heading { font-size: 26px; }
      .hero-section { padding: 20px 20px 48px; }
      .section { padding: 48px 20px; }
      .hamburger { display: flex; }
    }
  </style>
</head>

// ESCALATION CARD COMPONENT - Shows 311 info for municipal issues
function EscalationCard({ repSetName, cityName, issueId, isFrench }) {
  // First try representative_set_name lookup
  let info = typeof get311Info === 'function' ? get311Info(repSetName, isFrench) : null;
  
  // If not found, try city-based lookup
  if (!info && cityName && typeof getWebsiteByCity === 'function') {
    const website = getWebsiteByCity(cityName);
    if (website) {
      info = {
        has311: false,
        website: website,
        message: isFrench 
          ? `Pour les questions municipales, visitez ${website} ou contactez votre bureau municipal.`
          : `For municipal issues, visit ${website} or contact your municipal office.`
      };
    }
  }
  
  if (!info) {
    return (
      <div style={{background:'rgba(249,115,22,0.06)',border:'1px solid rgba(249,115,22,0.2)',borderRadius:12,padding:16,marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <span style={{fontWeight:600,color:'#EA580C'}}>{isFrench ? 'Signaler a votre municipalite' : 'Report to your municipality first'}</span>
        </div>
        <p style={{margin:0,fontSize:14,color:'#666',lineHeight:1.6}}>
          {isFrench 
            ? 'Pour les questions municipales, contactez le 311 de votre ville ou recherchez "[votre ville] signaler un probleme" en ligne.'
            : 'For municipal issues, contact your city\'s 311 service or search "[your city] report a problem" online.'}
        </p>
      </div>
    );
  }
  
  return (
    <div style={{background:'rgba(249,115,22,0.06)',border:'1px solid rgba(249,115,22,0.2)',borderRadius:12,padding:16,marginBottom:20}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
        <span style={{fontWeight:600,color:'#EA580C',fontSize:16}}>{isFrench ? 'Signaler a votre municipalite d\'abord' : 'Report to your municipality first'}</span>
      </div>
      
      <p style={{margin:'0 0 12px 0',fontSize:14,color:'#555',lineHeight:1.6}}>
        {isFrench 
          ? 'Pour les questions municipales, commencez par le 311. Si le probleme persiste, contactez votre conseiller.'
          : 'For municipal issues, start with 311. If the issue persists, contact your councillor.'}

function FeedbackModal({ isOpen, onClose, isFrench }) {
  const [form, setForm] = React.useState({name:'',email:'',message:''});
  const [status, setStatus] = React.useState('idle'); // idle, sending, success, error
  
  const labels = isFrench ? {
    title: "Envoyer des commentaires",
    subtitle: "Vos commentaires nous aident à améliorer cet outil pour tous les Canadiens.",
    name: "Nom",
    namePlaceholder: "Votre nom",
    email: "Courriel",
    emailPlaceholder: "votre@courriel.com",
    message: "Message",
    messagePlaceholder: "Vos commentaires...",
    sending: "Envoi en cours...",
    submit: "Envoyer",
    success: "Merci pour vos commentaires!",
    error: "Une erreur s'est produite. Veuillez réessayer."
  } : {
    title: "Send Feedback",
    subtitle: "Your feedback helps us improve this tool for all Canadians.",
    name: "Name",
    namePlaceholder: "Your name",
    email: "Email",
    emailPlaceholder: "your@email.com",
    message: "Message",
    messagePlaceholder: "Your feedback...",
    sending: "Sending...",
    submit: "Send Feedback",
    success: "Thank you for your feedback!",
    error: "Something went wrong. Please try again."
  };
  
  if (!isOpen) return null;
  
  const handleSubmit = async () => {
    if (!form.name || !form.email || !form.message) return;
    setStatus('sending');
    // Use mailto: as fallback since no backend exists
    const subject = encodeURIComponent('My Civic Voice Feedback');
    const body = encodeURIComponent(`Name: ${form.name}\nEmail: ${form.email}\n\nMessage:\n${form.message}`);
    window.location.href = `mailto:Pam.lighthouseai@gmail.com?subject=${subject}&body=${body}`;
    setStatus('success');
    setTimeout(() => { setStatus('idle'); onClose(); }, 2000);
  };
  
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h2 style={{margin:0,fontSize:22}}>{labels.title}</h2>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#888',fontSize:28,cursor:'pointer'}}>×</button>
        </div>
        <p style={{color:'#888',fontSize:14,marginBottom:20}}>{labels.subtitle}</p>
        {status === 'success' ? (
          <div style={{textAlign:'center',padding:40}}>
            <div style={{fontSize:48,color:'#10B981'}}></div>
            <p style={{marginTop:16}}>{labels.success}</p>
          </div>
        ) : (
          <>
            <div style={{marginBottom:16}}>
              <label style={{display:'block',marginBottom:6,fontSize:14,fontWeight:500}}>{labels.name}</label>
              <input value={form.name} onChange={e => setForm({...form,name:e.target.value})} placeholder={labels.namePlaceholder} />
            </div>
            <div style={{marginBottom:16}}>
              <label style={{display:'block',marginBottom:6,fontSize:14,fontWeight:500}}>{labels.email}</label>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{display:'block',marginBottom:6,fontSize:14,fontWeight:500}}>{labels.message}</label>
              <textarea value={form.message} onChange={e => setForm({...form,message:e.target.value})} placeholder={labels.messagePlaceholder} style={{minHeight:100}} />
            </div>
            {status === 'error' && <p style={{color:'#EF4444',marginBottom:12}}>{labels.error}</p>}
            <button className="btn-primary" onClick={handleSubmit} disabled={status==='sending'} style={{width:'100%'}}>
              {status === 'sending' ? labels.sending : labels.submit}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// MAIN APP
function App() {
  const [step, setStep] = React.useState(0); // 0 = landing page, 1/2/3 = tool steps
  const [isFrench, setIsFrench] = React.useState(() => {
    const saved = localStorage.getItem('myCivicVoice_language');
    if (saved) return saved === 'fr';
    return (navigator.language || '').startsWith('fr');
  });
  const [locType, setLocType] = React.useState('postal');
  const [postalCode, setPostalCode] = React.useState('');
  const [postalError, setPostalError] = React.useState('');
  const [city, setCity] = React.useState('');
  const [province, setProvince] = React.useState('');
  const [selCat, setSelCat] = React.useState(null);
  const [selIssue, setSelIssue] = React.useState(null);
  const [searchQ, setSearchQ] = React.useState('');
  const [reps, setReps] = React.useState({federal:[],provincial:[],municipal:[]});
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [uDetail, setUDetail] = React.useState('');
  const [uTone, setUTone] = React.useState('concerned');
  const [copied, setCopied] = React.useState(false);
  const [showFAQ, setShowFAQ] = React.useState(false);
  const [showFeedback, setShowFeedback] = React.useState(false);
  const [showPrivacy, setShowPrivacy] = React.useState(false);
  const [showAbout, setShowAbout] = React.useState(false);
  const [showShare, setShowShare] = React.useState(false);
  const [showTerms, setShowTerms] = React.useState(false);
  const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);
  const [selectedRep, setSelectedRep] = React.useState(null);
  const [prefetchedReps, setPrefetchedReps] = React.useState(null);
  const [prefetching, setPrefetching] = React.useState(false);
  const [linkCopiedToast, setLinkCopiedToast] = React.useState(false);
  const shareRef = React.useRef(null);
  const toolRef = React.useRef(null);
  
  // Pre-fetch representatives when postal code is valid in Step 1
  React.useEffect(() => {
    if (step !== 1) return;
    if (locType !== 'postal' || !postalCode) return;
    if (!isPostalCodeValid(postalCode)) return;
    
    const pc = postalCode.replace(/\s/g, '').toUpperCase();
    if (prefetchedReps && prefetchedReps.postalCode === pc) return;
    
    setPrefetching(true);
    
    fetch(`https://represent.opennorth.ca/postcodes/${pc}/`)
      .then(r => r.json())
      .then(d => {
        const grouped = {federal:[],provincial:[],municipal:[]};
        const reps = d.representatives_centroid || d.representatives_concordance || [];
        reps.forEach(r => {
          const nm = r.name || 'Unknown';
          const em = r.email || '';
          const off = r.district_name || '';
          const party = r.party_name || '';

            <div style={{fontWeight:600,color:'#B91C1C',marginBottom:8,fontSize:14}}> {getText('tipsHeader','Tips for a powerful letter:')}</div>
            <div style={{fontSize:13,color:'#666',lineHeight:1.7}}>
              {((isFrench && STORY_PROMPTS_FR && STORY_PROMPTS_FR[selCat.id]) ? STORY_PROMPTS_FR[selCat.id] : STORY_PROMPTS[selCat.id]).map((prompt, i) => {
                const prompts = isFrench && STORY_PROMPTS_FR && STORY_PROMPTS_FR[selCat.id] ? STORY_PROMPTS_FR[selCat.id] : STORY_PROMPTS[selCat.id];
                return <div key={i} style={{marginBottom:i < prompts.length - 1 ? 6 : 0}}>• {prompt}</div>;
              })}
                <div style={{marginTop:12,paddingTop:10,borderTop:'1px dashed rgba(242,140,56,0.3)',fontWeight:500,color:'#444'}}>• {isFrench ? 'Copiez la lettre, ajoutez votre nom et courriel, puis envoyez-la à votre représentant.' : 'Copy the letter to your email, add your name and email address, and send it to your representative.'}</div>
            </div>
          </div>
        )}
        
        <div style={{marginBottom:16}}>
        </div>
        <div style={{marginBottom:16}}>
          <textarea placeholder={getText('experiencePlaceholder','Describe how this issue affects you personally...')} value={uDetail} onChange={e=>setUDetail(e.target.value)} style={{minHeight:120}} />
        </div>
        
        {/* Generated email */}
        <div style={{background:'var(--civic-gray)',borderRadius:12,padding:16,fontFamily:'monospace',fontSize:13,whiteSpace:'pre-wrap',marginBottom:16,border:'1px solid #E0E4E8',color:'var(--charcoal)'}}>
          {selectedRep && (
            <div style={{marginBottom:12,paddingBottom:12,borderBottom:'1px solid #E0E4E8',color:'#047857',fontSize:12}}>
               {isFrench ? 'Destinataire sélectionné :' : 'Selected recipient:'} <strong>{selectedRep.name}</strong>
              {selectedRep.email && <span style={{color:'#888',marginLeft:8}}>({selectedRep.email})</span>}
            </div>
          )}
          {email}
        </div>
        
        {/* Actions */}
        <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:12}}>
          <button className="btn-primary" onClick={handleCopy}>{copied ? getText('copied','Copied!') : getText('copyToClipboard','Copy to Clipboard')}</button>
        </div>
        <p style={{color:'#888',fontSize:13,marginBottom:20}}>{getText('tip','Tip: Personalize the highlighted sections for maximum impact.')}</p>
        
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn-secondary" onClick={()=>setStep(2)}>{getText('back','← Back')}</button>
          <button className="btn-secondary" onClick={()=>{setStep(2);setSelIssue(null);setSelectedRep(null);}}>{getText('differentIssue','Different Issue')}</button>
          <button className="btn-secondary" onClick={()=>{setStep(2);setSelCat(null);setSelIssue(null);setSelectedRep(null);}}>{getText('allCategoriesBtn','← All categories')}</button>
          <button className="btn-secondary" style={{background:'rgba(239,68,68,0.06)',borderColor:'rgba(239,68,68,0.2)',color:'#EF4444'}} onClick={()=>{setStep(1);setPostalCode('');setCity('');setProvince('');setSelCat(null);setSelIssue(null);setPostalError('');setSelectedRep(null);}}>{getText('startOver','Start Over')}</button>
        </div>
        </>
      </div>
    );
  };

// MAIN RETURN
  return (
    <div>
      {/* NAVIGATION */}
      <nav className="site-nav">
        <div className="nav-inner">
          <a className="nav-logo" href="#" onClick={e=>{e.preventDefault();setStep(0);window.scrollTo({top:0,behavior:'smooth'});}}>
            <span style={{whiteSpace:'nowrap'}}><span style={{color:'var(--charcoal)'}}>My </span><span style={{color:'var(--civic-red)'}}>Civic</span><span style={{color:'var(--charcoal)'}}> Voice</span></span>
          </a>
          <div className="nav-links">
            <button className="nav-link" onClick={()=>{setStep(0);setTimeout(()=>document.getElementById('how-it-works')?.scrollIntoView({behavior:'smooth'}),100);}}>{isFrench ? 'Comment ça marche' : 'How It Works'}</button>
            <button className="nav-link" onClick={()=>setShowAbout(true)}>{getText('aboutTitle','About')}</button>
            <button className="nav-link" onClick={()=>setShowFAQ(true)}>{getText('helpFAQ','Help / FAQ')}</button>
            <LanguageToggle isFrench={isFrench} onToggle={handleLangToggle} />
            <button className="nav-cta" onClick={scrollToTool}>{getText('getStarted','Get Started')}</button>
          </div>
          <button className={`hamburger ${mobileMenuOpen ? 'active' : ''}`} onClick={()=>setMobileMenuOpen(!mobileMenuOpen)}>
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </nav>
      <div className={`mobile-menu ${mobileMenuOpen ? 'open' : ''}`}>
        <button className="nav-link" onClick={()=>{setStep(0);setTimeout(()=>{document.getElementById('how-it-works')?.scrollIntoView({behavior:'smooth'});setMobileMenuOpen(false);},100);}}>{isFrench ? 'Comment ça marche' : 'How It Works'}</button>
        <button className="nav-link" onClick={()=>{setShowAbout(true);setMobileMenuOpen(false);}}>{getText('aboutTitle','About')}</button>
        <button className="nav-link" onClick={()=>{setShowFAQ(true);setMobileMenuOpen(false);}}>{getText('helpFAQ','Help / FAQ')}</button>
        <LanguageToggle isFrench={isFrench} onToggle={handleLangToggle} />
        <button className="nav-cta" onClick={()=>{scrollToTool();setMobileMenuOpen(false);}}>{getText('getStarted','Get Started')}</button>
      </div>
      
      {/* LANDING PAGE */}

                {isFrench ? 'L\'engagement civique simplifié.' : 'Civic engagement made simple.'}
              </h1>
              <p className="hero-sub">
                {isFrench 
                  ? 'Ma Voix Civique aide les Canadiens à comprendre les enjeux, à se connecter avec leurs représentants et à participer à façonner leurs communautés.'
                  : 'My Civic Voice helps Canadians understand issues, connect with representatives, and participate in shaping their communities.'}
              </p>
              <div className="hero-buttons">
                <button className="btn-primary" onClick={scrollToTool}>{getText('getStarted','Get Started')}</button>
                <button className="btn-outline" onClick={()=>document.getElementById('how-it-works')?.scrollIntoView({behavior:'smooth'})}>
                  {isFrench ? 'Comment ça marche' : 'Learn How It Works'}
                </button>
              </div>
            </div>
          </section>
          
          {/* PROBLEM SECTION */}
          <section className="section section-gray">
            <div className="section-inner" style={{textAlign:'center',maxWidth:800,margin:'0 auto'}}>
              <h2 className="section-heading">
                {isFrench ? 'La démocratie fonctionne mieux quand tout le monde participe.' : 'Democracy works best when everyone participates.'}
              </h2>
              <p style={{fontSize:18,color:'#555',lineHeight:1.8,marginBottom:0}}>
                {isFrench 
                  ? 'Beaucoup de Canadiens veulent rester informés et impliqués dans leurs communautés, mais l\'information est souvent confuse, dispersée ou difficile d\'accès. Ma Voix Civique simplifie la participation civique en vous donnant des informations claires, des outils et des moyens de vous engager dans votre communauté.'
                  : 'Many Canadians want to stay informed and involved in their communities, but information is often confusing, scattered, or difficult to access. My Civic Voice simplifies civic participation by giving you clear information, tools, and ways to engage with your community.'}
              </p>
            </div>
          </section>
          
          {/* HOW IT WORKS */}
          <section className="section section-white" id="how-it-works">
            <div className="section-inner">
              <h2 className="section-heading">
                {isFrench ? 'Comment ça marche' : 'How It Works'}
              </h2>
              <p className="section-subheading">
                {isFrench ? 'Trois étapes simples pour faire entendre votre voix.' : 'Three simple steps to make your voice heard.'}
              </p>
              <div className="how-cards">
                <div className="how-card">
                  <div className="how-card-icon"></div>
                  <h3>{isFrench ? 'Apprendre' : 'Learn'}</h3>
                  <p>{isFrench 
                    ? 'Comprenez les enjeux qui affectent votre communauté avec des informations claires et accessibles.'
                    : 'Understand the issues that affect your community with clear and accessible information.'}</p>
                </div>
                <div className="how-card">
                  <div className="how-card-icon"></div>
                  <h3>{isFrench ? 'S\'engager' : 'Engage'}</h3>
                  <p>{isFrench 
                    ? 'Connectez-vous avec vos représentants et découvrez des opportunités de participer aux décisions locales.'
                    : 'Connect with your representatives and discover opportunities to participate in local decision-making.'}</p>
                </div>
                <div className="how-card">
                  <div className="how-card-icon"></div>
                  <h3>{isFrench ? 'Agir' : 'Act'}</h3>
                  <p>{isFrench 
                    ? 'Prenez des mesures significatives en participant aux initiatives civiques et aux discussions communautaires.'
                    : 'Take meaningful action by participating in civic initiatives and community discussions.'}</p>
                </div>
              </div>
            </div>
          </section>
          
          {/* WHY IT MATTERS */}
          <section className="section section-gray">
            <div className="section-inner">
              <div className="why-grid">
                <div>
                  <h2 style={{fontSize:32,fontWeight:700,marginBottom:16,textAlign:'left'}}>
                    {isFrench ? 'Des communautés plus fortes commencent avec des citoyens informés.' : 'Stronger communities start with informed citizens.'}
                  </h2>
                  <p style={{fontSize:18,color:'#555',lineHeight:1.8,marginBottom:24}}>
                    {isFrench 
                      ? 'Quand les gens comprennent les enjeux autour d\'eux et se sentent habilités à participer, les communautés deviennent plus fortes, plus inclusives et plus résilientes.'
                      : 'When people understand the issues around them and feel empowered to participate, communities become stronger, more inclusive, and more resilient.'}
                  </p>
                  <p style={{fontSize:16,color:'#666',lineHeight:1.7}}>
                    {isFrench 
                      ? 'Ma Voix Civique existe pour rendre la participation civique plus facile et plus accessible pour tous.'
                      : 'My Civic Voice exists to make civic participation easier and more accessible for everyone.'}
                  </p>
                </div>
                <div className="why-visual">
                  <div style={{display:'flex',flexDirection:'column',gap:16,padding:40,width:'100%'}}>
                    <div style={{display:'flex',alignItems:'center',gap:12,background:'var(--white)',borderRadius:12,padding:'14px 18px',boxShadow:'var(--shadow)'}}>
                      <span style={{fontSize:24}}></span>
                      <div>
                        <div style={{fontWeight:600,fontSize:14,color:'var(--civic-red)'}}>{isFrench ? 'Fédéral' : 'Federal'}</div>
                        <div style={{fontSize:12,color:'#888'}}>{isFrench ? 'Députés et sénateurs' : 'MPs & Senators'}</div>
                      </div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:12,background:'var(--white)',borderRadius:12,padding:'14px 18px',boxShadow:'var(--shadow)'}}>
                      <span style={{fontSize:24}}></span>
                      <div>
                        <div style={{fontWeight:600,fontSize:14,color:'var(--civic-red)'}}>{isFrench ? 'Provincial' : 'Provincial'}</div>
                        <div style={{fontSize:12,color:'#888'}}>{isFrench ? 'Députés provinciaux' : 'MPPs, MLAs, MNAs'}</div>
                      </div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:12,background:'var(--white)',borderRadius:12,padding:'14px 18px',boxShadow:'var(--shadow)'}}>
                      <span style={{fontSize:24}}></span>
                      <div>
                        <div style={{fontWeight:600,fontSize:14,color:'var(--civic-red)'}}>{isFrench ? 'Municipal' : 'Municipal'}</div>
                        <div style={{fontSize:12,color:'#888'}}>{isFrench ? 'Maires et conseillers' : 'Mayors & Councillors'}</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>
          
          {/* CTA */}
          <section className="section section-dark cta-section">
            <div className="cta-inner">
              <h2 style={{fontSize:36,fontWeight:700,marginBottom:16}}>
                {isFrench ? 'Aidez à renforcer la participation civique au Canada.' : 'Help strengthen civic participation in Canada.'}
              </h2>
              <p style={{fontSize:18,color:'rgba(255,255,255,0.8)',marginBottom:8,maxWidth:700,margin:'0 auto 8px'}}>
                {isFrench 
                  ? 'Si vous croyez que l\'engagement civique devrait être plus facile pour tous, partagez Ma Voix Civique avec votre communauté.'
                  : 'If you believe civic engagement should be easier for everyone, share My Civic Voice with your community.'}
              </p>
              <p style={{fontSize:15,color:'rgba(255,255,255,0.6)',maxWidth:600,margin:'0 auto 36px'}}>
                {isFrench 
                  ? 'De petites actions peuvent créer de grands changements. En partageant cette plateforme, vous aidez plus de Canadiens à découvrir des moyens d\'apprendre, de s\'engager et de participer dans leurs communautés.'
                  : 'Small actions can create big change. By sharing this platform, you help more Canadians discover ways to learn, engage, and participate in their communities.'}
              </p>
              <div className="share-grid">
                <a className="share-btn" href={`mailto:?subject=${encodeURIComponent(isFrench ? 'Découvrez Ma Voix Civique' : 'Check out My Civic Voice')}&body=${encodeURIComponent((isFrench ? 'J\'ai trouvé cette plateforme qui aide les Canadiens à participer à l\'engagement civique.' : 'I found this platform that helps Canadians participate in civic engagement.') + ' https://mycivicvoice.ca')}`}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                  {isFrench ? 'Partager par courriel' : 'Share by Email'}
                </a>
                <a className="share-btn" href={`https://www.linkedin.com/sharing/share-offsite/?url=https://mycivicvoice.ca`} target="_blank" rel="noopener noreferrer">
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                  {isFrench ? 'Partager sur LinkedIn' : 'Share on LinkedIn'}
                </a>
                <a className="share-btn" href={`https://twitter.com/intent/tweet?text=${encodeURIComponent((isFrench ? 'Découvrez Ma Voix Civique — une plateforme aidant les Canadiens à participer à l\'engagement civique.' : 'Check out My Civic Voice — a platform helping Canadians participate in civic engagement.'))}&url=https://mycivicvoice.ca`} target="_blank" rel="noopener noreferrer">
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                  {isFrench ? 'Partager sur X' : 'Share on X'}
                </a>
                <button className="share-btn" onClick={handleCopyLink}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                  {linkCopiedToast ? (isFrench ? 'Lien copié!' : 'Link copied!') : (isFrench ? 'Copier le lien' : 'Copy Link')}
                </button>
              </div>
              <p style={{fontSize:14,color:'rgba(255,255,255,0.5)',marginTop:20}}>
                {isFrench ? 'Pas de spam. Juste aider plus de Canadiens à participer dans leurs communautés.' : 'No spam. Just helping more Canadians participate in their communities.'}
              </p>
            </div>
          </section>
        </>
      )}
      
      {/* TOOL SECTION */}
      {step >= 1 && (
        <section className="tool-section" ref={toolRef}>
          <div className="tool-inner">
            {/* Tool header */}
            <div style={{textAlign:'center',marginBottom:32}}>
              <h2 style={{fontSize:28,fontWeight:700,marginBottom:8,color:'var(--civic-red)'}}>
                {getText('siteTitle','My Civic Voice')}
              </h2>
              <p style={{color:'#666',maxWidth:560,margin:'0 auto',lineHeight:1.6,fontSize:15}}>
                {getText('siteExplain','Find your elected representatives and draft letters about issues that matter to you. Federal, provincial, or municipal — we\'ll help you reach the right level of government.')}
              </p>
              <div style={{marginTop:16,padding:'12px 16px',background:'rgba(47,164,169,0.06)',border:'1px solid rgba(47,164,169,0.15)',borderRadius:12,maxWidth:540,margin:'16px auto 0'}}>
                <p style={{margin:0,fontSize:14,color:'var(--charcoal)',lineHeight:1.6}}>
                   <strong style={{color:'var(--civic-accent)'}}>{isFrench ? 'Pourquoi ça compte :' : 'Why it matters:'}</strong> {isFrench ? 'Les représentants élus accordent la priorité aux messages venant de leur propre circonscription. Votre code postal prouve que vous êtes leur électeur — ce qui donne plus de poids à votre voix.' : 'Elected representatives prioritize messages from their own constituency. Your postal code proves you\'re their constituent — giving your voice more weight.'}
                </p>
              </div>
            </div>
            
            {/* Navigation */}
            {step === 2 && (
              <div style={{marginBottom:16,display:'flex',gap:8,flexWrap:'wrap'}}>
                <button className="btn-secondary" onClick={()=>setStep(1)}>{getText('back','← Back')}</button>
              </div>
            )}
            {step === 3 && (
              <div style={{marginBottom:16,display:'flex',gap:8,flexWrap:'wrap'}}>
                <button className="btn-secondary" onClick={()=>{setStep(2);setSelectedRep(null);}}>{getText('back','← Back')}</button>
                <button className="btn-secondary" onClick={()=>{setStep(2);setSelIssue(null);setSelectedRep(null);}}>{getText('differentIssue','Different Issue')}</button>
                <button className="btn-secondary" style={{background:'rgba(239,68,68,0.06)',borderColor:'rgba(239,68,68,0.2)',color:'#EF4444'}} onClick={()=>{setStep(1);setPostalCode('');setCity('');setProvince('');setSelCat(null);setSelIssue(null);setPostalError('');setSelectedRep(null);}}>{getText('startOver','Start Over')}</button>
              </div>
            )}
            
            {/* Steps */}
            {step === 1 && renderStep1()}
            {step === 2 && renderStep2()}
            {step === 3 && renderStep3()}
            
            {/* Tool footer */}
            <div style={{textAlign:'center',marginTop:40,paddingTop:20,borderTop:'1px solid #E0E4E8'}}>
              <div style={{marginBottom:12}}>
                <button className="footer-btn" onClick={()=>setShowFAQ(true)}>{getText('helpFAQ','Help / FAQ')}</button>
                <button className="footer-btn" onClick={()=>setShowPrivacy(true)}>{getText('privacyTitle','Privacy')}</button>
                <button className="footer-btn" onClick={()=>setShowAbout(true)}>{getText('aboutTitle','About')}</button>
                <button className="footer-btn" onClick={()=>setShowTerms(true)}>{isFrench ? 'Conditions' : 'Terms'}</button>
                <button className="footer-btn" onClick={()=>setShowFeedback(true)}>{getText('sendFeedback','Send Feedback')}</button>
              </div>
              <p style={{color:'#aaa',fontSize:11,marginTop:8}}>
                {isFrench ? 'Données des représentants : API Represent d\'OpenNorth' : 'Representative data: OpenNorth Represent API'} 
                <span style={{margin:'0 8px'}}>•</span>
                <a href="https://opennorth.ca/" target="_blank" rel="noopener noreferrer" style={{color:'#999',fontWeight:400}}>OpenNorth.ca</a>
              </p>
            </div>
          </div>
        </section>
      )}
      
      {/* FOOTER */}
      <footer className="site-footer">
        <div className="footer-inner">
          <div className="footer-col">
            <h4>{getText('siteTitle','My Civic Voice')}</h4>
            <p>{isFrench 
              ? 'Un outil gratuit et à but non lucratif conçu pour aider les citoyens canadiens à entrer en contact avec leurs représentants élus et à participer à façonner leurs communautés.'
              : 'A free, non-profit tool designed to help Canadian citizens connect with their elected representatives and participate in shaping their communities.'}</p>
            <p style={{marginTop:12,fontSize:13,color:'rgba(255,255,255,0.5)'}}>
              {isFrench ? 'Créé par Pam et Daniel chez LighthouseAI' : 'Made by Pam & Daniel at LighthouseAI'}
            </p>
          </div>
          <div className="footer-col">
            <h4>{isFrench ? 'Navigation' : 'Navigation'}</h4>
            <a className="footer-link" href="#" onClick={e=>{e.preventDefault();setStep(0);window.scrollTo({top:0,behavior:'smooth'})}}>{isFrench ? 'Accueil' : 'Home'}</a>
            <a className="footer-link" href="#" onClick={e=>{e.preventDefault();setStep(0);setTimeout(()=>document.getElementById('how-it-works')?.scrollIntoView({behavior:'smooth'}),100);}}>{isFrench ? 'Comment ça marche' : 'How It Works'}</a>
            <a className="footer-link" href="#" onClick={e=>{e.preventDefault();setShowAbout(true);}}>{getText('aboutTitle','About')}</a>
          </div>
          <div className="footer-col">
            <h4>{isFrench ? 'Légal' : 'Legal'}</h4>
            <a className="footer-link" href="#" onClick={e=>{e.preventDefault();setShowPrivacy(true);}}>{getText('privacyTitle','Privacy')}</a>
            <a className="footer-link" href="#" onClick={e=>{e.preventDefault();setShowTerms(true);}}>{isFrench ? 'Conditions d\'utilisation' : 'Terms of Use'}</a>
          </div>
        </div>
        <div className="footer-bottom">
          <p>{getText('footerCopyright','© 2026 Daniel / LighthouseAI. All rights reserved.')}</p>
          <p style={{marginTop:6}}>
            {isFrench ? 'Données des représentants : API Represent d\'OpenNorth' : 'Representative data: OpenNorth Represent API'}
            <span style={{margin:'0 8px'}}>•</span>
            <a href="https://opennorth.ca/" target="_blank" rel="noopener noreferrer" style={{color:'rgba(255,255,255,0.6)',fontWeight:400}}>OpenNorth.ca</a>
          </p>
        </div>
      </footer>
      
      {/* Modals */}
      <FAQModal isOpen={showFAQ} onClose={()=>setShowFAQ(false)} isFrench={isFrench} />
      <FeedbackModal isOpen={showFeedback} onClose={()=>setShowFeedback(false)} isFrench={isFrench} />
      <PrivacyModal isOpen={showPrivacy} onClose={()=>setShowPrivacy(false)} isFrench={isFrench} />
      <AboutModal isOpen={showAbout} onClose={()=>setShowAbout(false)} isFrench={isFrench} />
      <TermsModal isOpen={showTerms} onClose={()=>setShowTerms(false)} isFrench={isFrench} />
    </div>
  );
}

// Render
ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
